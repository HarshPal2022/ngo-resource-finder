<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NGOConnect AI{% endblock %}</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-slate-100 text-slate-800">
    <!-- ================= NAVBAR ================= -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-16">
                <div>
                    <h1 class="text-2xl font-bold text-blue-700">
                        NGOConnect AI
                    </h1>
                    <p class="text-xs text-slate-500">
                        Maharashtra NGO Discovery Platform
                    </p>
                </div>
                <div class="hidden md:flex gap-8">
                    <a href="#search" class="hover:text-blue-600 transition">
                        Search
                    </a>
                    <a href="#recommend" class="hover:text-blue-600 transition">
                        AI Match
                    </a>
                    <a href="#results" class="hover:text-blue-600 transition">
                        Results
                    </a>
                </div>
            </div>
        </div>
    </nav>
    <!-- ================= MAIN ================= -->
    <main class="min-h-screen">
        {% block content %}
        {% endblock %}
    </main>
    <!-- ================= FOOTER ================= -->
    <footer class="bg-slate-900 text-white mt-20">
        <div class="max-w-7xl mx-auto px-6 py-10">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div>
                    <h2 class="font-bold text-lg">
                        NGOConnect AI
                    </h2>
                    <p class="text-slate-400 mt-2">
                        AI-powered NGO Discovery Platform for Maharashtra
                    </p>
                </div>
                <div class="mt-6 md:mt-0 text-sm text-slate-400">
                    Built with Flask • MySQL • Scikit-learn • Tailwind CSS
                </div>
            </div>
        </div>
    </footer>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
